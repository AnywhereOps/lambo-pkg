---
name: AutoPkg Run via CLI

on:
  # schedule:
  #   - cron: "0 0 * * *"  # Adjust schedule as needed
  workflow_dispatch:  # Enables manual triggering

jobs:
  autopkg-run:
    runs-on: macos-latest
    env:
      MUNKI_VERSION: 6.7.0
      MUNKI_EXPLICIT_VERSION: 6.7.0.4731
      APKG_VERSION: 2.7.6 # 'AUTOPKG_' gets injected as an env var
      MUNKI_REPO: AnywhereOps/munkisrv

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Fetch GitHub App secret
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            MUNKISRV_APP, ${{ secrets.MUNKISRV_GITHUB_APP_ARN }}
          parse-json-secrets: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ env.MUNKISRV_APP_APP_ID }}
          private-key: ${{ env.MUNKISRV_APP_PRIVATE_KEY }}
          owner: AnywhereOps

      - name: Checkout Munki repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MUNKI_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          path: munkisrv

      - name: Configure Munki repo push credentials
        run: |
          cd munkisrv
          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ env.MUNKI_REPO }}.git"

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            metadata_cache.json
          key: cache-${{ hashFiles('uv.lock') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install AutoPkg
        uses: joncrain/macos-pkg-install@v1.0
        with:
          pkg_url: https://github.com/autopkg/autopkg/releases/download/v${{ env.APKG_VERSION }}/autopkg-${{ env.APKG_VERSION }}.pkg

      - name: Install Munki
        uses: joncrain/macos-pkg-install@v1.0
        with:
          pkg_url: https://github.com/munki/munki/releases/download/v${{ env.MUNKI_VERSION }}/munkitools-${{ env.MUNKI_EXPLICIT_VERSION }}.pkg

      - name: Configure AutoPkg
        run: |
          AUTOPKG_DIR="${GITHUB_WORKSPACE}/AutoPkg"
          MUNKI_DIR="${GITHUB_WORKSPACE}/munkisrv/munkirepo"

          defaults write com.github.autopkg CACHE_DIR "${AUTOPKG_DIR}/Cache"
          defaults write com.github.autopkg FAIL_RECIPES_WITHOUT_TRUST_INFO -bool TRUE
          defaults write com.github.autopkg GITHUB_TOKEN "${{ secrets.GITHUB_TOKEN }}"
          defaults write com.github.autopkg MUNKI_REPO "${MUNKI_DIR}"
          defaults write com.github.autopkg RECIPE_OVERRIDE_DIRS "${AUTOPKG_DIR}/Overrides"

      - name: AutoPkg Repo Add
        run: |
          cat "AutoPkg/repo_list.txt" | xargs autopkg repo-add

      - name: Run AutoPkg
        env:
          AUTOPKG_MUNKI_BUCKET_NAME: ${{ secrets.MUNKI_S3_BUCKET }}
          AUTOPKG_S3_PREFIX: repo
        run: |
          uv run cloud-autopkg-runner -v \
            --recipe-list AutoPkg/recipe_list.json \
            --cache-file metadata_cache.json \
            --log-file autopkg_runner.log \
            --pre-processor com.github.mscottblake-recipes.SharedPreProcessors/MunkiWorktreeCreator.py \
            --post-processor com.github.mscottblake-recipes.SharedPostProcessors/MunkiWorktreeCommitter.py \
            --post-processor com.github.mscottblake-recipes.SharedPostProcessors/CacheCleaner.py \
            --post-processor com.github.mscottblake-recipes.SharedPostProcessors/S3Uploader.py \
            --report-dir AutoPkg/Reports/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autopkg-run-artifacts
          path: |
            AutoPkg/Cache/**/*receipt*
            AutoPkg/Reports/*
            autopkg_runner.log
            metadata_cache.json